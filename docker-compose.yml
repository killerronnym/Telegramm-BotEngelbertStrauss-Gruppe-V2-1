version: '3.8'

services:
  bot-system:
    build: .
    container_name: bot-engine-v2
    restart: always
    ports:
      - "9002:9002"
    volumes:
      # Empfohlen fǬr In-App Updates & Legacy-Configs: Den gesamten Projekt-Ordner mounten.
      - .:/app
      # WICHTIG: Die folgenden Ordner muessen auf dem Host existieren und beschreibbar sein.
      - ./instance:/app/instance
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
      - FLASK_ENV=production
      # - TELEGRAM_BOT_TOKEN=dein_token_hier (Optional, falls .env nicht genutzt wird)
      # Falls eine externe MySQL Datenbank genutzt wird, kann diese hier verlinkt werden
      # networks:
      #   - bot-network

      # networks:
      #   bot-network:
      #     driver: bridge
